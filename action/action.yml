name: 'Setup OrchStep (deprecated)'
description: 'DEPRECATED — use orchstep/setup-orchstep instead'
author: 'OrchStep'

branding:
  icon: 'terminal'
  color: 'gray-dark'

inputs:
  version:
    description: 'OrchStep version to install'
    required: false
    default: 'latest'

runs:
  using: 'composite'
  steps:
    - name: Deprecation notice
      shell: bash
      run: |
        echo "::warning title=Deprecated action::orchstep/orchstep/action is deprecated. Migrate to orchstep/setup-orchstep@v1 — see https://github.com/orchstep/setup-orchstep"
    - name: Forward to setup-orchstep
      uses: orchstep/setup-orchstep@v1
      with:
        version: ${{ inputs.version }}
