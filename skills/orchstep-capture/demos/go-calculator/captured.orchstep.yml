name: go-calculator
desc: Build a tiny Go calculator package with Sum(a,b) and table-driven tests, then verify with go test and go vet.

defaults:
  module_name: "calculator"
  workdir: "./calc-demo"

tasks:
  build:
    desc: "Scaffold the package, source, and test files"
    steps:
      - name: clean_workdir
        desc: "Start from a clean directory"
        func: shell
        do: |
          rm -rf {{ vars.workdir }}
          mkdir -p {{ vars.workdir }}

      - name: go_mod_init
        desc: "Initialize the Go module"
        func: shell
        do: |
          cd {{ vars.workdir }}
          go mod init {{ vars.module_name }}

      - name: write_calculator
        desc: "Create calculator.go with Sum(a, b int) int"
        func: shell
        do: |
          cat > {{ vars.workdir }}/calculator.go <<'EOF'
          package calculator

          func Sum(a, b int) int {
              return a + b
          }
          EOF

      - name: write_test
        desc: "Create table-driven test in calculator_test.go"
        func: shell
        do: |
          cat > {{ vars.workdir }}/calculator_test.go <<'EOF'
          package calculator

          import "testing"

          func TestSum(t *testing.T) {
              cases := []struct {
                  name     string
                  a, b     int
                  expected int
              }{
                  {"two plus three", 2, 3, 5},
                  {"neg one plus one", -1, 1, 0},
                  {"zero plus zero", 0, 0, 0},
              }
              for _, c := range cases {
                  t.Run(c.name, func(t *testing.T) {
                      if got := Sum(c.a, c.b); got != c.expected {
                          t.Errorf("Sum(%d, %d) = %d; want %d", c.a, c.b, got, c.expected)
                      }
                  })
              }
          }
          EOF

  verify:
    desc: "Run go test and go vet against the package"
    steps:
      - name: go_test
        desc: "Run table-driven tests"
        func: shell
        do: |
          cd {{ vars.workdir }}
          go test -v ./...

      - name: go_vet
        desc: "Static analysis"
        func: shell
        do: |
          cd {{ vars.workdir }}
          go vet ./...

      - name: summary
        desc: "Print one-line summary"
        func: shell
        do: |
          echo "module={{ vars.module_name }} func=Sum(a,b int) int tests=3 status=PASS"

  main:
    desc: "Build and verify the calculator package"
    steps:
      - name: do_build
        task: build
      - name: do_verify
        task: verify
