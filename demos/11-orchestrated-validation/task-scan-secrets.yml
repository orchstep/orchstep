# Re-usable task: Scan for Secrets and Leaks
# Maps to validate.yml job "Check No Secrets Leaked"
# Checks that no Go source code leaked into the public repo (outside skills/)
# and scans for potential license key patterns.
#
# Usage: call this task with `task: scan-secrets` from any workflow.

name: task-scan-secrets
desc: "Scan for leaked Go source and potential secrets"

tasks:
  scan_secrets:
    desc: "Check for Go source leaks and secret key patterns"
    steps:
      - name: check_go_leak
        func: shell
        do: |
          GO_FILES=$(find . -name "*.go" -not -path "./skills/*" | wc -l)
          if [ "${GO_FILES}" -gt 0 ]; then
            echo "ERROR: Found ${GO_FILES} .go files outside skills/!"
            find . -name "*.go" -not -path "./skills/*"
            exit 1
          fi
          echo "go_leak_check=pass"
          echo "No Go source leaked outside skills/"
        outputs:
          go_leak_check: "{{ result.output | regexFind \"go_leak_check=([^\\s]+)\" }}"

      - name: check_license_keys
        func: shell
        on_error: warn
        do: |
          FOUND=$(grep -rn "ORCH-[A-Z0-9]\{4\}-[A-Z0-9]\{4\}-[A-Z0-9]\{4\}-[A-Z0-9]\{4\}" . \
            --include="*.md" --include="*.yml" --include="*.json" | \
            grep -v "ORCH-XXXX\|ORCH-TEST\|ORCH-aBcD" || true)
          if [ -n "$FOUND" ]; then
            echo "WARNING: Possible real license key found!"
            echo "$FOUND"
          else
            echo "license_key_check=pass"
            echo "No license keys detected"
          fi
        outputs:
          license_key_check: "{{ result.output | regexFind \"license_key_check=([^\\s]+)\" }}"

      - name: assert_clean
        func: assert
        args:
          condition: '{{ eq steps.check_go_leak.go_leak_check "pass" }}'
          desc: "No Go source code leaked outside skills/"

  main:
    desc: "Run secret scan"
    steps:
      - task: scan_secrets