# Demo 1 — Sequential Validation
# Replaces actions/checkout@v4 with @orchstep/github_action_git-checkout.
# The first step clones the orchstep/orchstep repo into /tmp/ws.
# All subsequent steps operate inside the cloned repo via `cd /tmp/ws`.

name: orchstep-demo1-sequential
desc: "Validate orchstep repo — sequential (git-checkout replaces actions/checkout)"

modules:
  - name: git-checkout
    source: "modules/@orchstep/github_action_git-checkout"

tasks:
  main:
    desc: "Clone repo via git-checkout, then run 5 validations"
    steps:
      - name: clone_repo
        desc: "Replace actions/checkout@v4 — clone orchstep/orchstep using native func: git"
        task: git-checkout.checkout
        with:
          repository: "https://github.com/orchstep/orchstep.git"
          ref: "main"
          path: "/tmp/ws"
          depth: "1"

      - name: validate_registry
        desc: "Check modules/registry.json structure"
        func: shell
        do: "cd /tmp/ws && python3 -c \"import json;reg=json.load(open('modules/registry.json'));n=len(reg['modules']);[assert all(k in m for k in ('name','version','tier')) and m['tier'] in ('official','community','ai') for m in reg['modules']];print('Registry OK: %d modules' % n)\""

      - name: lint_examples
        desc: "Lint all example YAML files"
        func: shell
        do: |
          cd /tmp/ws
          pip install yamllint -q 2>/dev/null
          find examples -name "*.yml" -exec yamllint -d relaxed {} + 2>&1 | tail -3
          echo "OK: $(find examples -name '*.yml' | wc -l) files"

      - name: check_modules
        desc: "Check every module has metadata"
        func: shell
        do: |
          cd /tmp/ws
          for d in modules/@orchstep/*/; do
            m=$(basename "$d")
            [ -f "${d}orchstep-module.yml" ] || [ -f "${d}orchstep.yml" ] || echo "WARN: $m no metadata"
          done

      - name: check_links
        desc: "Scan for broken markdown links"
        on_error: warn
        func: shell
        do: |
          cd /tmp/ws
          for f in README.md docs/; do
            find "$f" -name "*.md" 2>/dev/null | while read md; do
              dir=$(dirname "$md")
              grep -oP '\(\.\.?/[^)]+\)' "$md" 2>/dev/null | tr -d '()' | while read l; do
                full="$dir/$l"; [ -e "$full" ] || [ -e "$l" ] || echo "BROKEN: $md -> $l"
              done
            done 2>/dev/null
          done || true

      - name: scan_secrets
        desc: "Check for Go source leaks and license key patterns"
        func: shell
        do: |
          cd /tmp/ws
          F=$(find . -name "*.go" -not -path "./skills/*" | wc -l)
          [ "$F" -eq 0 ] || { echo "ERROR: $F .go files outside skills/!"; find . -name "*.go" -not -path "./skills/*"; exit 1; }
          FOUND=$(grep -rn "ORCH-[A-Z0-9]\{4\}-[A-Z0-9]\{4\}-[A-Z0-9]\{4\}-[A-Z0-9]\{4\}" . \
            --include="*.md" --include="*.yml" --include="*.json" 2>/dev/null | \
            grep -v "ORCH-XXXX\|ORCH-TEST\|ORCH-aBcD" || true)
          [ -z "$FOUND" ] && echo "Secrets: PASS" || { echo "$FOUND"; echo "WARNING: keys found"; }

      - name: summary
        func: shell
        do: |
          echo "=== orchstep-demo1: ALL SEQUENTIAL CHECKS PASSED ==="
          echo "Repo cloned via @orchstep/github_action_git-checkout (func: git)"