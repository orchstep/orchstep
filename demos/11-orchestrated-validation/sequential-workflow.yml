# Demo 1 — Sequential Validation
# Can be run standalone (clones repo via module) or in CI (repo pre-cloned).
# Uses @community/github_action_git-checkout to clone the repo via native func: git.

name: orchstep-demo1-sequential
desc: "Validate orchstep repo — sequential"

tasks:
  main:
    desc: "Clone repo via module (if not pre-cloned), then run 5 validations"
    steps:
      - name: validate_registry
        desc: "Check modules/registry.json"
        func: shell
        do: "python3 -c \"import json;n=len(json.load(open('../../modules/registry.json'))['modules']);print('Registry OK: %d modules' % n)\""

      - name: lint_examples
        desc: "Lint example YAML files"
        func: shell
        do: |
          cd ../../examples
          pip install yamllint -q 2>/dev/null
          find . -name "*.yml" -exec yamllint -d relaxed {} + 2>&1 | tail -3
          echo "OK: $(find . -name '*.yml' | wc -l) files"

      - name: check_modules
        desc: "Check module metadata"
        func: shell
        do: |
          cd ../../modules/@orchstep
          for d in */; do
            m=$(basename "$d")
            [ -f "${d}orchstep-module.yml" ] || [ -f "${d}orchstep.yml" ] || echo "WARN: $m no metadata"
          done

      - name: check_links
        desc: "Check broken links"
        on_error: warn
        func: shell
        do: |
          cd ../..
          for f in README.md docs/; do
            find "$f" -name "*.md" 2>/dev/null | while read md; do
              dir=$(dirname "$md")
              grep -oP '\(\.\.?/[^)]+\)' "$md" 2>/dev/null | tr -d '()' | while read l; do
                full="$dir/$l"; [ -e "$full" ] || [ -e "$l" ] || echo "BROKEN: $md -> $l"
              done
            done 2>/dev/null
          done || true

      - name: scan_secrets
        desc: "Scan for secrets"
        func: shell
        do: |
          cd ../..
          F=$(find . -name "*.go" -not -path "./skills/*" | wc -l)
          [ "$F" -eq 0 ] || { echo "ERROR: $F .go files outside skills/!"; find . -name "*.go" -not -path "./skills/*"; exit 1; }
          FOUND=$(grep -rn "ORCH-[A-Z0-9]\{4\}-[A-Z0-9]\{4\}-[A-Z0-9]\{4\}-[A-Z0-9]\{4\}" . \
            --include="*.md" --include="*.yml" --include="*.json" 2>/dev/null | \
            grep -v "ORCH-XXXX\|ORCH-TEST\|ORCH-aBcD" || true)
          [ -z "$FOUND" ] && echo "Secrets: PASS" || { echo "$FOUND"; echo "WARNING"; }

      - name: summary
        func: shell
        do: 'echo "=== orchstep-demo1: SEQUENTIAL VALIDATION PASSED ==="'