# Demo 1 — Sequential Validation
# One self-contained OrchStep workflow that runs 5 validation checks
# in sequence. Each validation is its own task, demonstrating re-usable
# task design within a single file.
#
# Also demonstrates @orchstep/github_action_git-checkout by cloning the
# public orchstep-website repo (a real, practical use of the module).

name: orchstep-demo1-sequential
desc: "Validate the orchstep repo — sequential pipeline"

modules:
  - name: git-checkout
    source: "modules/@orchstep/github_action_git-checkout"

tasks:
  validate_registry:
    desc: "Validate modules/registry.json structure"
    steps:
      - name: check_json
        func: shell
        do: |
          python3 -c "
import json
reg = json.load(open('modules/registry.json'))
assert 'version' in reg
assert 'modules' in reg
for m in reg['modules']:
    assert all(k in m for k in ('name','version','tier'))
    assert m['tier'] in ('official','community','ai')
print(f'Registry valid: {len(reg[\"modules\"])} modules')
"

  validate_examples:
    desc: "Lint example YAML files"
    steps:
      - name: lint
        func: shell
        do: |
          pip install yamllint -q 2>/dev/null
          find examples -name "*.yml" -exec yamllint -d relaxed {} + 2>&1 | tail -3
          echo "count=$(find examples -name '*.yml' | wc -l)"
        outputs:
          count: "{{ result.output | regexFind 'count=([0-9]+)' }}"

  validate_modules:
    desc: "Check module metadata"
    steps:
      - name: check
        func: shell
        do: |
          for d in modules/@orchstep/*/; do
            m=$(basename "$d")
            [ -f "${d}orchstep-module.yml" ] || [ -f "${d}orchstep.yml" ] || echo "WARN: $m no metadata"
          done
          echo "checked=$(ls -d modules/@orchstep/*/ | wc -l)"

  check_links:
    desc: "Scan for broken markdown links"
    steps:
      - name: scan
        on_error: warn
        func: shell
        do: |
          for f in README.md CONTRIBUTING.md docs/; do
            find "$f" -name "*.md" 2>/dev/null | while read md; do
              dir=$(dirname "$md")
              grep -oP '\(\.\.?/[^)]+\)' "$md" 2>/dev/null | tr -d '()' | while read l; do
                full="$dir/$l"; [ -e "$full" ] || [ -e "$l" ] || echo "BROKEN: $md -> $l"
              done
            done 2>/dev/null
          done || true

  scan_secrets:
    desc: "Check for Go source leaks and license keys outside skills/"
    steps:
      - name: go_leak
        func: shell
        do: |
          F=$(find . -name "*.go" -not -path "./skills/*" | wc -l)
          [ "$F" -eq 0 ] || { echo "ERROR: $F .go files outside skills/!"; find . -name "*.go" -not -path "./skills/*"; exit 1; }
          echo "go_check=pass"
        outputs:
          go_check: "{{ result.output | regexFind 'go_check=([^\\s]+)' }}"

      - name: keys
        func: shell
        do: |
          FOUND=$(grep -rn "ORCH-[A-Z0-9]\{4\}-[A-Z0-9]\{4\}-[A-Z0-9]\{4\}-[A-Z0-9]\{4\}" . \
            --include="*.md" --include="*.yml" --include="*.json" 2>/dev/null | \
            grep -v "ORCH-XXXX\|ORCH-TEST\|ORCH-aBcD" || true)
          [ -z "$FOUND" ] && echo "keys=pass" || { echo "$FOUND"; echo "WARNING"; }
        outputs:
          keys: "{{ result.output | regexFind 'keys=([^\\s]+)' }}"

  main:
    desc: "Bootstrap checkout then run validations sequentially"
    steps:
      - name: clone_website
        desc: "Demonstrate @orchstep/github_action_git-checkout on orchstep-website"
        task: git-checkout.checkout
        with:
          repository: "github.com/orchstep/orchstep-website.git"
          ref: "main"
          path: "/tmp/orchstep-website"
          depth: "1"

      - name: verify_clone
        func: shell
        do: |
          HASH=$(git -C /tmp/orchstep-website rev-parse --short HEAD 2>/dev/null || echo '?')
          echo "Cloned orchstep-website @ $HASH"

      - name: validate_registry
        task: validate_registry

      - name: validate_examples
        task: validate_examples

      - name: validate_modules
        task: validate_modules

      - name: check_links
        task: check_links

      - name: scan_secrets
        task: scan_secrets

      - name: summary
        func: shell
        do: |
          echo "=== orchstep-validate sequential: ALL PASSED ==="