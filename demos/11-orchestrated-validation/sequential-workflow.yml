# Demo 1 — Sequential Validation
# All 5 validation checks are inlined as tasks within this workflow.
# @orchstep/github_action_git-checkout replaces actions/checkout@v4
# by cloning the orchstep-website repo using OrchStep's native func: git.

name: orchstep-demo1-sequential
desc: "Validate the orchstep repo — sequential pipeline"

modules:
  - name: git-checkout
    source: "modules/@orchstep/github_action_git-checkout"

tasks:
  main:
    desc: "Clone orchstep-website via git-checkout module, then run 5 validations"
    steps:
      - name: clone_website
        desc: "Use @orchstep/github_action_git-checkout (native func: git) instead of actions/checkout@v4"
        task: git-checkout.checkout
        with:
          repository: "https://github.com/orchstep/orchstep-website.git"
          ref: "main"
          path: "/tmp/orchstep-website"
          depth: "1"

      - name: validate_registry
        desc: "Check modules/registry.json structure"
        func: shell
        do: |
          python3 -c "
import json
reg = json.load(open('modules/registry.json'))
for m in reg['modules']:
    assert all(k in m for k in ('name','version','tier'))
    assert m['tier'] in ('official','community','ai')
print(f'Registry OK: {len(reg[\"modules\"])} modules')
"

      - name: lint_examples
        desc: "Lint all example YAML files"
        func: shell
        do: |
          pip install yamllint -q 2>/dev/null
          find examples -name "*.yml" -exec yamllint -d relaxed {} + 2>&1 | tail -3
          echo "OK: $(find examples -name '*.yml' | wc -l) YAML files"

      - name: check_modules
        desc: "Check every module has metadata"
        func: shell
        do: |
          for d in modules/@orchstep/*/; do
            m=$(basename "$d")
            [ -f "${d}orchstep-module.yml" ] || [ -f "${d}orchstep.yml" ] || echo "WARN: $m no metadata"
          done
          echo "OK: $(ls -d modules/@orchstep/*/ | wc -l) modules"

      - name: check_links
        desc: "Scan for broken markdown links"
        on_error: warn
        func: shell
        do: |
          for f in README.md docs/; do
            find "$f" -name "*.md" 2>/dev/null | while read md; do
              dir=$(dirname "$md")
              grep -oP '\(\.\.?/[^)]+\)' "$md" 2>/dev/null | tr -d '()' | while read l; do
                full="$dir/$l"; [ -e "$full" ] || [ -e "$l" ] || echo "BROKEN: $md -> $l"
              done
            done 2>/dev/null
          done || true

      - name: scan_secrets
        desc: "Check for Go source leaks outside skills/ and license key patterns"
        func: shell
        do: |
          F=$(find . -name "*.go" -not -path "./skills/*" | wc -l)
          [ "$F" -eq 0 ] || { echo "ERROR: $F .go files outside skills/!"; find . -name "*.go" -not -path "./skills/*"; exit 1; }
          FOUND=$(grep -rn "ORCH-[A-Z0-9]\{4\}-[A-Z0-9]\{4\}-[A-Z0-9]\{4\}-[A-Z0-9]\{4\}" . \
            --include="*.md" --include="*.yml" --include="*.json" 2>/dev/null | \
            grep -v "ORCH-XXXX\|ORCH-TEST\|ORCH-aBcD" || true)
          [ -z "$FOUND" ] && echo "Secrets check: PASS" || { echo "$FOUND"; echo "WARNING: keys found"; }
          echo "Clone: $(git -C /tmp/orchstep-website rev-parse --short HEAD 2>/dev/null)"

      - name: summary
        func: shell
        do: |
          echo "=== orchstep-demo1: SEQUENTIAL VALIDATION PASSED ==="
          echo "git-checkout: cloned orchstep-website"
          echo "registry, yaml, modules, links, secrets: all checked"