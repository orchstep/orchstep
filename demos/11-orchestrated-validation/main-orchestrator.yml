# Demo 3 — Module-Based Orchestration
# Each validation check is a proper @orchstep/demo-* module imported via
# the `modules:` block and invoked with the `module:` + `task:` keys.
#
# This is architecturally distinct from Demo 1 (inlined tasks) and
# Demo 2 (parallel execution): the orchestrator owns no validation logic
# of its own — it composes five independent, reusable modules. Each module
# lives under modules/@orchstep/ (the official registry scope) and is
# sourced here by path so the demo runs against the repo as cloned in CI.

name: orchstep-demo3-modules
desc: "Validate orchstep repo — module-based orchestration"

modules:
  - name: vjson
    source: "../../modules/@orchstep/demo-validate-json"
  - name: vyaml
    source: "../../modules/@orchstep/demo-validate-yaml"
  - name: vmods
    source: "../../modules/@orchstep/demo-check-modules"
  - name: vlinks
    source: "../../modules/@orchstep/demo-check-links"
  - name: vsecret
    source: "../../modules/@orchstep/demo-scan-secrets"

tasks:
  main:
    desc: "Orchestrate 5 demo validation modules"
    steps:
      - name: validate_registry
        desc: "Module: vjson.check"
        module: vjson
        task: check

      - name: lint_examples
        desc: "Module: vyaml.check"
        module: vyaml
        task: check

      - name: check_modules
        desc: "Module: vmods.check"
        module: vmods
        task: check

      - name: check_links
        desc: "Module: vlinks.check"
        module: vlinks
        task: check

      - name: scan_secrets
        desc: "Module: vsecret.check"
        module: vsecret
        task: check

      - name: summary
        func: shell
        do: 'echo "=== orchstep-demo3: MODULE-BASED ORCHESTRATION PASSED ==="'
