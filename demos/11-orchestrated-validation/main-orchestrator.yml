# Demo 3 — Module-Based Orchestration (remote modules)
# Each validation check is a proper @orchstep/demo-* module pulled from the
# official registry over the network — not from local disk. The engine
# resolves each `@orchstep/demo-*` source to a versioned tag, fetches it into
# the module cache, and invokes its task via the `module:` + `task:` keys.
#
# This is architecturally distinct from Demo 1 (inlined tasks) and
# Demo 2 (parallel execution): the orchestrator owns no validation logic of
# its own and ships no module files — it composes five independent, remotely
# distributed, versioned modules.

name: orchstep-demo3-modules
desc: "Validate orchstep repo — module-based orchestration"

modules:
  - name: vjson
    source: "@orchstep/demo-validate-json"
    version: "^1.0.0"
  - name: vyaml
    source: "@orchstep/demo-validate-yaml"
    version: "^1.0.0"
  - name: vmods
    source: "@orchstep/demo-check-modules"
    version: "^1.0.0"
  - name: vlinks
    source: "@orchstep/demo-check-links"
    version: "^1.0.0"
  - name: vsecret
    source: "@orchstep/demo-scan-secrets"
    version: "^1.0.0"

tasks:
  main:
    desc: "Orchestrate 5 demo validation modules"
    steps:
      - name: validate_registry
        desc: "Module: vjson.check"
        module: vjson
        task: check

      - name: lint_examples
        desc: "Module: vyaml.check"
        module: vyaml
        task: check

      - name: check_modules
        desc: "Module: vmods.check"
        module: vmods
        task: check

      - name: check_links
        desc: "Module: vlinks.check"
        module: vlinks
        task: check

      - name: scan_secrets
        desc: "Module: vsecret.check"
        module: vsecret
        task: check

      - name: summary
        func: shell
        do: 'echo "=== orchstep-demo3: MODULE-BASED ORCHESTRATION PASSED ==="'
