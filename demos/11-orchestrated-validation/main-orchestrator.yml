# Demo 3 — Module-Based Orchestration
# All 5 validation checks are imported as proper modules from
# modules/@orchstep/validate-* and called via module.task syntax.
#
# Also demonstrates @orchstep/github_action_git-checkout for bootstrap.

name: orchstep-demo3-modules
desc: "Validate the orchstep repo — module-based orchestration"

modules:
  - name: git-checkout
    source: "modules/@orchstep/github_action_git-checkout"
  - name: vjson
    source: "modules/@orchstep/validate-json"
  - name: vyaml
    source: "modules/@orchstep/validate-yaml"
  - name: vmods
    source: "modules/@orchstep/validate-modules"
  - name: vlinks
    source: "modules/@orchstep/check-links"
  - name: vsecret
    source: "modules/@orchstep/scan-secrets"

tasks:
  main:
    desc: "Orchestrate 6 modules — checkout + 5 validation checks"
    steps:
      - name: clone_website
        desc: "Demonstrate git-checkout on a second repo"
        task: git-checkout.checkout
        with:
          repository: "github.com/orchstep/orchstep-website.git"
          ref: "main"
          path: "/tmp/orchstep-website"
          depth: "1"

      - name: validate_registry
        desc: "Module: vjson.validate_schema"
        task: vjson.validate_schema

      - name: validate_examples
        desc: "Module: vyaml.lint_files"
        task: vyaml.lint_files
        with:
          search_path: "examples"

      - name: validate_modules
        desc: "Module: vmods.check_metadata"
        task: vmods.check_metadata

      - name: check_links
        desc: "Module: vlinks.scan"
        task: vlinks.scan

      - name: scan_secrets
        desc: "Module: vsecret.scan"
        task: vsecret.scan

      - name: summary
        func: shell
        do: |
          echo "=== orchstep-validate module-based: DONE ==="