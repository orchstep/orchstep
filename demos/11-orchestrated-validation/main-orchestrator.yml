# Demo 3 — 5 Validations Orchestrated
# Self-contained workflow with inlined tasks.
# @orchstep/github_action_git-checkout clones a second repo using
# OrchStep's native func: git (not actions/checkout@v4).

name: orchstep-demo3-orchestrated
desc: "Validate the orchstep repo — orchestrated"

modules:
  - name: git-checkout
    source: "modules/@orchstep/github_action_git-checkout"

tasks:
  main:
    desc: "Clone via git-checkout module, then run 5 validation tasks"
    steps:
      - name: clone_website
        desc: "Uses native func: git via @orchstep/github_action_git-checkout"
        task: git-checkout.checkout
        with:
          repository: "https://github.com/orchstep/orchstep-website.git"
          ref: "main"
          path: "/tmp/orchstep-website"
          depth: "1"

      - name: validate_registry
        func: shell
        do: |
          python3 -c "
import json
reg = json.load(open('modules/registry.json'))
for m in reg['modules']:
    assert all(k in m for k in ('name','version','tier'))
    assert m['tier'] in ('official','community','ai')
print(f'Registry OK: {len(reg[\"modules\"])} modules')
"

      - name: lint_examples
        func: shell
        do: |
          pip install yamllint -q 2>/dev/null
          find examples -name "*.yml" -exec yamllint -d relaxed {} + 2>&1 | tail -3
          echo "OK: $(find examples -name '*.yml' | wc -l) files"

      - name: check_modules
        func: shell
        do: |
          for d in modules/@orchstep/*/; do
            m=$(basename "$d")
            [ -f "${d}orchstep-module.yml" ] || [ -f "${d}orchstep.yml" ] || echo "WARN: $m no metadata"
          done

      - name: check_links
        on_error: warn
        func: shell
        do: |
          for f in README.md docs/; do
            find "$f" -name "*.md" 2>/dev/null | while read md; do
              dir=$(dirname "$md")
              grep -oP '\(\.\.?/[^)]+\)' "$md" 2>/dev/null | tr -d '()' | while read l; do
                full="$dir/$l"; [ -e "$full" ] || [ -e "$l" ] || echo "BROKEN: $md -> $l"
              done
            done 2>/dev/null
          done || true

      - name: scan_secrets
        func: shell
        do: |
          F=$(find . -name "*.go" -not -path "./skills/*" | wc -l)
          [ "$F" -eq 0 ] || { echo "ERROR: $F .go files outside skills/!"; find . -name "*.go" -not -path "./skills/*"; exit 1; }
          FOUND=$(grep -rn "ORCH-[A-Z0-9]\{4\}-[A-Z0-9]\{4\}-[A-Z0-9]\{4\}-[A-Z0-9]\{4\}" . \
            --include="*.md" --include="*.yml" --include="*.json" 2>/dev/null | \
            grep -v "ORCH-XXXX\|ORCH-TEST\|ORCH-aBcD" || true)
          [ -z "$FOUND" ] && echo "Secrets: PASS" || { echo "$FOUND"; echo "WARNING"; }

      - name: summary
        func: shell
        do: |
          echo "=== orchstep-demo3: ALL VALIDATIONS PASSED ==="