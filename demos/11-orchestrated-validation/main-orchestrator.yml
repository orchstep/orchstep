# Demo 3 — Orchestrated Validation (5 checks sequentially)
# Runs from the repo root (cd ../.. from this file's parent directory).
# Designed for CI where the repo is pre-cloned by the --module step.

name: orchstep-demo3-orchestrated
desc: "Validate orchstep repo — orchestrated"

tasks:
  main:
    desc: "Run 5 validations"
    steps:
      - name: validate_registry
        func: shell
        do: "cd ../.. && python3 -c \"import json;n=len(json.load(open('modules/registry.json'))['modules']);print('OK: %d modules' % n)\""

      - name: lint_examples
        func: shell
        do: |
          cd ../../examples
          pip install yamllint -q 2>/dev/null
          find . -name "*.yml" -exec yamllint -d relaxed {} + 2>&1 | tail -3
          echo "OK: $(find . -name '*.yml' | wc -l) files"

      - name: check_modules
        func: shell
        do: |
          cd ../../modules/@orchstep
          for d in */; do
            m=$(basename "$d")
            [ -f "${d}orchstep-module.yml" ] || [ -f "${d}orchstep.yml" ] || echo "WARN: $m no metadata"
          done

      - name: check_links
        on_error: warn
        func: shell
        do: |
          cd ../..
          for f in README.md docs/; do
            find "$f" -name "*.md" 2>/dev/null | while read md; do
              dir=$(dirname "$md")
              grep -oP '\(\.\.?/[^)]+\)' "$md" 2>/dev/null | tr -d '()' | while read l; do
                full="$dir/$l"; [ -e "$full" ] || [ -e "$l" ] || echo "BROKEN: $md -> $l"
              done
            done 2>/dev/null
          done || true

      - name: scan_secrets
        func: shell
        do: |
          cd ../..
          F=$(find . -name "*.go" -not -path "./skills/*" | wc -l)
          [ "$F" -eq 0 ] || { echo "ERROR: $F .go files outside skills/!"; find . -name "*.go" -not -path "./skills/*"; exit 1; }
          FOUND=$(grep -rn "ORCH-[A-Z0-9]\{4\}-[A-Z0-9]\{4\}-[A-Z0-9]\{4\}-[A-Z0-9]\{4\}" . --include="*.md" --include="*.yml" --include="*.json" 2>/dev/null | grep -v "ORCH-XXXX\|ORCH-TEST\|ORCH-aBcD" || true)
          [ -z "$FOUND" ] && echo "Secrets: PASS" || { echo "$FOUND"; echo "WARNING"; }

      - name: summary
        func: shell
        do: 'echo "=== orchstep-demo3: ALL CHECKS PASSED ==="'