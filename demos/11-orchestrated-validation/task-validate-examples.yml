# Re-usable task: Validate Example YAMLs
# Maps to validate.yml job "Validate Example YAML"
# Lints all example YAML files and produces a file count.
#
# Usage: call this task with `task: validate-examples` from any workflow.

name: task-validate-examples
desc: "Lint example YAML files and report count"

tasks:
  validate_yamls:
    desc: "Lint all example YAML files"
    steps:
      - name: lint_examples
        func: shell
        do: |
          pip install yamllint -q
          find examples -name "*.yml" -exec yamllint -d relaxed {} \; 2>&1 | tail -5
          COUNT=$(find examples -name "*.yml" | wc -l)
          echo "Total examples: ${COUNT}"
          echo "example_count=${COUNT}"
          echo "## Examples: ${COUNT} YAML files"
        outputs:
          example_count: "{{ result.output | regexFind \"example_count=([0-9]+)\" }}"

      - name: assert_has_examples
        func: assert
        args:
          condition: '{{ gt (int (steps.lint_examples.example_count)) 0 }}'
          desc: "There must be at least one example YAML file"

  main:
    desc: "Run example YAML validation"
    steps:
      - task: validate_yamls