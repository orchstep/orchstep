# Demo 2 — Parallel Validation
# All 5 validation checks run in parallel using `parallel:`.
# @orchstep/github_action_git-checkout clones orchstep-website using
# native func: git — no actions/checkout@v4 needed for secondary repos.

name: orchstep-demo2-parallel
desc: "Validate the orchstep repo — parallel pipeline"

modules:
  - name: git-checkout
    source: "modules/@orchstep/github_action_git-checkout"

tasks:
  main:
    desc: "Run git-checkout + 5 validations in parallel"
    steps:
      - name: all_checks
        parallel:
          - name: clone_website
            desc: "Demonstrate git-checkout (uses OrchStep's native func: git, not shell git)"
            task: git-checkout.checkout
            with:
              repository: "https://github.com/orchstep/orchstep-website.git"
              ref: "main"
              path: "/tmp/orchstep-website"
              depth: "1"

          - name: validate_registry
            func: shell
            do: python3 -c "import json;reg=json.load(open('modules/registry.json'));[assert all(k in m for k in ('name','version','tier')) and m['tier'] in ('official','community','ai') for m in reg['modules']];print(f'Registry OK: {len(reg[\"modules\"])} modules')"

          - name: lint_examples
            func: shell
            do: |
              pip install yamllint -q 2>/dev/null
              find examples -name "*.yml" -exec yamllint -d relaxed {} + 2>&1 | tail -3
              echo "OK: $(find examples -name '*.yml' | wc -l) files"

          - name: check_modules
            func: shell
            do: |
              for d in modules/@orchstep/*/; do
                m=$(basename "$d")
                [ -f "${d}orchstep-module.yml" ] || [ -f "${d}orchstep.yml" ] || echo "WARN: $m no metadata"
              done
              echo "OK: $(ls -d modules/@orchstep/*/ | wc -l) modules"

          - name: check_links
            on_error: warn
            func: shell
            do: |
              for f in README.md docs/; do
                find "$f" -name "*.md" 2>/dev/null | while read md; do
                  dir=$(dirname "$md")
                  grep -oP '\(\.\.?/[^)]+\)' "$md" 2>/dev/null | tr -d '()' | while read l; do
                    full="$dir/$l"; [ -e "$full" ] || [ -e "$l" ] || echo "BROKEN: $md -> $l"
                  done
                done 2>/dev/null
              done || true

          - name: scan_secrets
            func: shell
            do: |
              F=$(find . -name "*.go" -not -path "./skills/*" | wc -l)
              [ "$F" -eq 0 ] || { echo "ERROR: $F .go files outside skills/!"; find . -name "*.go" -not -path "./skills/*"; exit 1; }
              FOUND=$(grep -rn "ORCH-[A-Z0-9]\{4\}-[A-Z0-9]\{4\}-[A-Z0-9]\{4\}-[A-Z0-9]\{4\}" . \
                --include="*.md" --include="*.yml" --include="*.json" 2>/dev/null | \
                grep -v "ORCH-XXXX\|ORCH-TEST\|ORCH-aBcD" || true)
              [ -z "$FOUND" ] && echo "Secrets: PASS" || { echo "$FOUND"; echo "WARNING"; }

      - name: summary
        func: shell
        do: |
          echo "=== orchstep-demo2: PARALLEL VALIDATION PASSED ==="
          echo "clone: $(git -C /tmp/orchstep-website rev-parse --short HEAD 2>/dev/null || echo '?')"
          echo "registry:  {{ steps.all_checks.validate_registry.status }}"
          echo "examples:  {{ steps.all_checks.lint_examples.status }}"
          echo "modules:   {{ steps.all_checks.check_modules.status }}"
          echo "links:     {{ steps.all_checks.check_links.status }}"
          echo "secrets:   {{ steps.all_checks.scan_secrets.status }}"