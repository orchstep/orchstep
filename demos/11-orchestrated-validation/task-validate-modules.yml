# Re-usable task: Validate Module YAMLs
# Maps to validate.yml job "Validate Module YAML"
# Checks that every module directory has its required metadata file.
#
# Usage: call this task with `task: validate-modules` from any workflow.

name: task-validate-modules
desc: "Validate module YAML structure"

tasks:
  validate_module_yamls:
    desc: "Check every module directory has an orchstep-module.yml or orchstep.yml"
    steps:
      - name: install_yamllint
        func: shell
        do: pip install yamllint -q

      - name: lint_module_yamls
        func: shell
        on_error: warn
        do: |
          find modules/@orchstep -name "*.yml" -exec yamllint -d relaxed {} + || true
          echo "yamllint completed (warnings are advisory)"

      - name: check_module_structure
        func: shell
        do: |
          MISSING=0
          for dir in modules/@orchstep/*/; do
            module=$(basename "$dir")
            if [ ! -f "${dir}orchstep-module.yml" ] && [ ! -f "${dir}orchstep.yml" ]; then
              echo "WARNING: ${module} has no orchstep-module.yml or orchstep.yml"
              MISSING=$((MISSING + 1))
            else
              echo "OK: ${module}"
            fi
          done
          TOTAL=$(ls -d modules/@orchstep/*/ | wc -l)
          echo "total_modules=${TOTAL}"
          echo "missing_metadata=${MISSING}"
        outputs:
          total_modules: "{{ result.output | regexFind \"total_modules=([0-9]+)\" }}"

      - name: assert_has_modules
        func: assert
        args:
          condition: '{{ gt (int (steps.check_module_structure.total_modules)) 0 }}'
          desc: "There must be at least one module defined"

  main:
    desc: "Run module YAML validation"
    steps:
      - task: validate_module_yamls