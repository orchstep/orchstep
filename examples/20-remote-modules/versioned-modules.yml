# Same module under different constraints to show version selection.
# Try: orchstep run   (^1.0.0 -> v1.1.0, * -> v2.0.0)
name: versioned-modules-demo
desc: "Semver constraints against a real module's tags"

modules:
  - name: compatible
    source: "github.com/orchstep/test-module-single"
    version: "^1.0.0"      # highest 1.x -> v1.1.0
  - name: latest
    source: "github.com/orchstep/test-module-single"
    version: "*"           # highest available -> v2.0.0

tasks:
  main:
    steps:
      - { name: c, module: compatible, task: hello, with: { name: "caret ^1.0.0" } }
      - { name: l, module: latest,     task: hello, with: { name: "wildcard *" } }
