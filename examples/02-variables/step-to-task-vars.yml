# Example: Passing Variables Between Tasks
# Call reusable tasks with different parameters using with:.
# Task-level vars define defaults; callers override with with:.
#
# This pattern lets you define a task once and invoke it multiple
# times with different configurations -- like a function call.
#
# Try: orchstep run

name: step-to-task-vars-demo
desc: "Reusable tasks with parameterized invocation"

defaults:
  organization: "acme-corp"
  region: "us-east-1"

tasks:
  # Reusable task: deploy a service with configurable parameters
  deploy_service:
    desc: "Generic service deployment (called with different params)"
    vars:
      service_name: "unnamed-service"
      environment: "dev"
      replicas: "1"
      timeout: "300"
    steps:
      - name: configure
        desc: "Show deployment configuration"
        func: shell
        do: |
          echo "=== Deploying {{ vars.service_name }} ==="
          echo "Environment: {{ vars.environment }}"
          echo "Replicas:    {{ vars.replicas }}"
          echo "Timeout:     {{ vars.timeout }}s"
          echo "Region:      {{ vars.region }}"
          echo "Org:         {{ vars.organization }}"
        outputs:
          deployment_id: "deploy-{{ vars.service_name }}-{{ vars.environment }}"
          status: "success"
          replicas: "{{ vars.replicas }}"

      - name: execute
        desc: "Run the deployment"
        func: shell
        do: |
          echo "kubectl apply -f {{ vars.service_name }}.yml \
            --replicas={{ vars.replicas }} \
            --timeout={{ vars.timeout }}s"

  # Main task: orchestrate multiple deployments
  main:
    desc: "Deploy services to different environments"
    steps:
      # Same task, different environments
      - name: deploy_to_dev
        desc: "Deploy auth-service to dev"
        task: deploy_service
        with:
          service_name: "auth-service"
          environment: "development"
          replicas: "1"
          timeout: "60"

      - name: deploy_to_staging
        desc: "Deploy auth-service to staging"
        task: deploy_service
        with:
          service_name: "auth-service"
          environment: "staging"
          replicas: "3"
          timeout: "180"

      - name: deploy_to_production
        desc: "Deploy auth-service to production"
        task: deploy_service
        with:
          service_name: "auth-service"
          environment: "production"
          replicas: "10"
          timeout: "300"

      # Access outputs from task calls
      - name: summary
        desc: "Show deployment summary"
        func: shell
        do: |
          echo ""
          echo "=== Deployment Summary ==="
          echo "Dev:  {{ steps.deploy_to_dev.deployment_id }} ({{ steps.deploy_to_dev.replicas }} replicas)"
          echo "Stg:  {{ steps.deploy_to_staging.deployment_id }} ({{ steps.deploy_to_staging.replicas }} replicas)"
          echo "Prod: {{ steps.deploy_to_production.deployment_id }} ({{ steps.deploy_to_production.replicas }} replicas)"
