# Example: Remote Module Import
# Import a module straight from a Git repository over the network.
# OrchStep resolves the version from the repo's tags, caches it locally,
# and makes its tasks available — no install step required.
#
# Two source styles, both shown below:
#   1. Full Git URL           source: "github.com/org/repo"          (single-module repo)
#   2. Official registry scope source: "@orchstep/<name>"            (the orchstep monorepo)
#      Built-in scopes: @orchstep (official), @community (verified), @ai (AI-generated).
#      All three resolve to modules/@<scope>/<name> in github.com/orchstep/orchstep.
#
# This example is runnable — it imports a real demo module.
#
# Try: orchstep run

name: remote-registry-import-demo
desc: "Import and use a module from a remote Git repository"

modules:
  # Full-URL import of a real single-module repo (tags: v1.1.0, v2.0.0).
  - name: greeter
    source: "github.com/orchstep/test-module-single"
    version: "^1.0.0"        # resolves to the latest 1.x → v1.1.0

  # Official-registry import via scope shorthand (real @community module):
  # - name: checkout
  #   source: "@community/github_action_git-checkout"
  #   version: "^1.0.0"

tasks:
  main:
    desc: "Call a task from the remote module"
    steps:
      - name: greet
        module: greeter
        task: hello
        with:
          name: "OrchStep"

      - name: explain
        func: shell
        do: |
          echo ""
          echo "=== Remote Module Import ==="
          echo "Full URL:        source: github.com/org/repo        version: ^1.0.0"
          echo "Registry scope:  source: @orchstep/<name>           version: ^1.0.0"
          echo "                 (@orchstep | @community | @ai are built-in scopes)"
          echo ""
          echo "Versions come from the repo's git tags; modules are cached"
          echo "locally after first download. Use version constraints to"
          echo "control updates and 'orchstep module lock' to pin them."
