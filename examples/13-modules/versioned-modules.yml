# Example: Versioned Module Imports
# Use semantic version constraints to pin module versions.
# Supported: ^1.0.0, ~1.2.0, >=1.0.0, 1.2.0 (exact), * (any)
#
# Constraints are matched against the repo's git tags. This example
# imports the same real module (tags: v1.1.0, v2.0.0) under different
# constraints so you can see which version each one selects.
#
# Try: orchstep run
#  ->  'compatible' (^1.0.0) resolves to v1.1.0
#  ->  'latest'     (*)      resolves to v2.0.0

name: versioned-modules-demo
desc: "Semantic version constraints for module imports"

modules:
  # Caret (^1.0.0): highest compatible 1.x  -> v1.1.0 (not v2.0.0)
  - name: compatible
    source: "github.com/orchstep/test-module-single"
    version: "^1.0.0"

  # Exact: pin to a specific version -> v1.1.0 only
  - name: pinned
    source: "github.com/orchstep/test-module-single"
    version: "1.1.0"

  # Wildcard: accept any version -> highest available, v2.0.0
  - name: latest
    source: "github.com/orchstep/test-module-single"
    version: "*"

tasks:
  main:
    desc: "Show how each constraint resolves to a concrete version"
    steps:
      - name: from_compatible
        module: compatible
        task: hello
        with:
          name: "caret ^1.0.0"

      - name: from_latest
        module: latest
        task: hello
        with:
          name: "wildcard *"

      - name: explain_versions
        func: shell
        do: |
          echo ""
          echo "=== Semantic Version Constraints ==="
          echo "Constraint    Example     Matches"
          echo "----------    -------     -------"
          echo "^1.0.0        caret       >=1.0.0, <2.0.0  (compatible releases)"
          echo "~1.2.0        tilde       >=1.2.0, <1.3.0  (patch updates only)"
          echo "1.1.0         exact       1.1.0 only        (fully pinned)"
          echo ">=1.0.0       range       1.0.0 and above   (minimum version)"
          echo "*             wildcard    highest available (lockfile pins it)"
          echo ""
          echo "Recommendation:"
          echo "  Use ^x.y.z for most imports (accept compatible updates)"
          echo "  Use exact for production-critical modules"
          echo "  Commit orchstep.lock for reproducibility (orchstep module lock)"
