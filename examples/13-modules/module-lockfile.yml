# Example: Module Lockfile
# Pin module versions for reproducible builds.
# Even with version: *, the lockfile ensures consistent versions.
#
# Run `orchstep module lock` to resolve every imported module and write
# orchstep.lock. Commit that file so every teammate and CI run uses the
# exact same versions.
#
# Try:
#   orchstep module lock     # resolve + write orchstep.lock
#   cat orchstep.lock        # inspect the pinned versions
#   orchstep run             # run using the imported modules

name: module-lockfile-demo
desc: "Reproducible builds with orchstep.lock"

modules:
  - name: greeter
    source: "github.com/orchstep/test-module-single"
    version: "^1.0.0"    # flexible constraint — the lock pins the exact version

tasks:
  main:
    desc: "Explain the lockfile workflow"
    steps:
      - name: greet
        module: greeter
        task: hello
        with:
          name: "locked build"

      - name: explain_lockfile
        func: shell
        do: |
          echo ""
          echo "=== Module Lockfile (orchstep.lock) ==="
          echo "'orchstep module lock' records the exact version resolved for"
          echo "each module so every run is reproducible."
          echo ""
          echo "Example orchstep.lock:"
          echo "  modules:"
          echo "    greeter:"
          echo "      source: github.com/orchstep/test-module-single"
          echo "      version: 1.1.0"
          echo "      tag: v1.1.0"
          echo "      commit: \"\""
          echo ""
          echo "Workflow:"
          echo "  1. orchstep module lock   -- resolve + write orchstep.lock"
          echo "  2. commit orchstep.lock   -- to version control"
          echo "  3. teammates/CI           -- get identical versions"
          echo "  4. orchstep module lock   -- re-run to bump within constraints"
