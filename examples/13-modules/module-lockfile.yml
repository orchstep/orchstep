# Example: Module Lockfile
# Pin module versions for reproducible builds.
# Even with version: *, the lockfile ensures consistent versions.
#
# When you run orchstep with modules, it resolves versions and
# writes orchstep-lock.yml. Subsequent runs use the locked
# versions instead of re-resolving.
#
# Commands:
#   orchstep run           -- uses locked versions
#   orchstep update        -- re-resolves and updates the lockfile
#
# Try: orchstep run

name: module-lockfile-demo
desc: "Reproducible builds with orchstep-lock.yml"

modules:
  - name: deploy
    source: "git:https://github.com/orchstep/modules.git#deploy"
    version: "^1.0.0"    # Flexible constraint

  - name: notify
    source: "git:https://github.com/orchstep/modules.git#notify"
    version: "*"          # Any version -- lockfile pins it

tasks:
  main:
    desc: "Explain the lockfile workflow"
    steps:
      - name: explain_lockfile
        func: shell
        do: |
          echo "=== Module Lockfile (orchstep-lock.yml) ==="
          echo ""
          echo "The lockfile records the exact versions resolved for"
          echo "each module, ensuring every team member and CI server"
          echo "uses the same versions."
          echo ""
          echo "Example orchstep-lock.yml:"
          echo "  modules:"
          echo "    deploy:"
          echo "      version: 1.2.3"
          echo "      resolved: git:https://github.com/orchstep/modules.git#deploy/v1.2.3"
          echo "      integrity: sha256:abc123..."
          echo "    notify:"
          echo "      version: 2.0.1"
          echo "      resolved: git:https://github.com/orchstep/modules.git#notify/v2.0.1"
          echo "      integrity: sha256:def456..."
          echo ""
          echo "Workflow:"
          echo "  1. orchstep run        -- resolves and creates lockfile"
          echo "  2. Commit orchstep-lock.yml to version control"
          echo "  3. Future runs use locked versions automatically"
          echo "  4. orchstep update     -- re-resolves to latest matching"
