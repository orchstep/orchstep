<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OrchStep Workflow Viewer — Dev</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }

    #editor { width: 40%; border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; }

    #viewer { width: 60%; }

  <div id="root"></div>
