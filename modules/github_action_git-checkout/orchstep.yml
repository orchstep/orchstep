name: github_action_git-checkout
desc: "Clone Git repos and checkout refs — replaces actions/checkout@v4 using OrchStep's native func: git"

tasks:
  checkout:
    desc: "Clone a repository and checkout a specific ref (branch, tag, or SHA). Uses OrchStep's native go-git implementation, not shell git."
    steps:
      - name: git_clone
        desc: "Clone via native OrchStep git function"
        func: git
        args:
          operation: "clone"
          url: "{{ vars.repository }}"
          dest: "{{ vars.path | default \".\" }}"
          branch: "{{ vars.ref | default \"main\" }}"
          depth: "{{ vars.depth | default \"1\" | int }}"
          single_branch: true
          force: true
          token: "{{ vars.token | default \"\" }}"

      - name: get_commit_info
        desc: "Report what was checked out"
        func: shell
        do: |
          cd "{{ vars.path | default '.' }}"
          SHA=$(git rev-parse HEAD 2>/dev/null || echo "unknown")
          BRANCH=$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "detached")
          echo "commit_sha=${SHA}"
          echo "branch=${BRANCH}"
          echo "clone_dir=$(pwd)"
        outputs:
          commit_sha: "{{ result.output | regexFind 'commit_sha=([a-f0-9]+)' }}"
          branch: "{{ result.output | regexFind 'branch=([^\\s]+)' }}"
          clone_dir: "{{ result.output | regexFind 'clone_dir=([^\\s]+)' }}"

  fetch:
    desc: "Fetch updates for an already-cloned repo"
    steps:
      - name: git_fetch
        func: git
        args:
          operation: "fetch"
          repo: "{{ vars.path }}"
          remote: "origin"
          depth: 1
      - name: git_checkout
        func: git
        args:
          operation: "checkout"
          repo: "{{ vars.path }}"
          version: "{{ vars.ref | default \"main\" }}"
          force: true