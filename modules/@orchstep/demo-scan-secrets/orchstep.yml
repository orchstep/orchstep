name: demo-scan-secrets
desc: "Scan for secrets (demo)"

tasks:
  check:
    desc: "Check for Go source leaks and license key patterns"
    steps:
      - name: go_leak
        func: shell
        do: |
          cd ../..
          F=$(find . -name "*.go" -not -path "./skills/*" | wc -l)
          [ "$F" -eq 0 ] || { echo "ERROR: $F .go files outside skills/!"; find . -name "*.go" -not -path "./skills/*"; exit 1; }
          echo "go_check=pass"

      - name: license_keys
        func: shell
        do: |
          cd ../..
          FOUND=$(grep -rn "ORCH-[A-Z0-9]\{4\}-[A-Z0-9]\{4\}-[A-Z0-9]\{4\}-[A-Z0-9]\{4\}" . --include="*.md" --include="*.yml" --include="*.json" 2>/dev/null | grep -v "ORCH-XXXX\|ORCH-TEST\|ORCH-aBcD" || true)
          [ -z "$FOUND" ] && echo "keys_check=pass" || { echo "$FOUND"; echo "WARNING"; }

  main:
    desc: "Run secret scan"
    steps:
      - task: check