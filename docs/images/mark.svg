    <path d="M 56.5 52.5 C 60 59.5 64 65.5 66 71.5 C 67.5 76 64 79.6 60 78 a 3.3 3.3 0 0 1 2.6 -5.9" stroke-width="4.3"/>
    <!-- center pair: short drop, curl away from each other -->
    <path d="M 47.5 54.5 C 46.8 60 46 65 45.2 69.5 C 44.4 73.8 40.6 74.6 38.8 71.6 a 3.0 3.0 0 0 1 5.2 -2.6" stroke-width="4.1"/>
