# Demo 1 — Sequential Validation (no actions/checkout@v4, no curl)
# `orchstep run --module @community/github_action_git-checkout` resolves,
# fetches, and runs the git-checkout module to clone the repo in one CLI
# command; then run-orchstep runs the sequential validation workflow.

name: demo-orchstep-sequential
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  orchstep-validate:
    name: orchstep validate (sequential)
    runs-on: ubuntu-latest
    steps:
      - uses: orchstep/setup-orchstep@v1
        with:
          version: latest

      # Clone the repo with OrchStep, replacing actions/checkout@v4.
      - name: Clone repo via OrchStep module
        run: |
          orchstep run --module @community/github_action_git-checkout checkout \
            --var repository="https://github.com/orchstep/orchstep.git" \
            --var path=repo --var ref=main --var depth=1

      # Run the validation workflow from the cloned repo.
      # The workflow path is relative to the cloned repo root.
      - uses: orchstep/run-orchstep@v1
        with:
          workflow: demos/11-orchestrated-validation/sequential-workflow.yml
          working-directory: repo