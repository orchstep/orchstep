# Demo 1 — Sequential Validation (no actions/checkout@v4)
# Bootstraps only the OrchStep workflow file + git-checkout module via curl,
# then delegates to the git-checkout module for the real repo clone.
#
# This demonstrates: actions/checkout@v4 replaced by @orchstep/github_action_git-checkout.
# The OrchStep workflow's FIRST step clones the full repo using native func: git,
# then runs 5 validations on the checked-out code.

name: demo-orchstep-sequential
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  orchstep-validate:
    name: orchstep validate (sequential)
    runs-on: ubuntu-latest
    steps:
      # Bootstrap: download just the OrchStep workflow file. No actions/checkout@v4.
      # The OrchStep workflow uses native func: git to clone the repo.
      - name: Bootstrap workflow file
        run: |
          mkdir -p demos/11-orchestrated-validation
          curl -fsSL https://raw.githubusercontent.com/orchstep/orchstep/main/demos/11-orchestrated-validation/sequential-workflow.yml \
            -o demos/11-orchestrated-validation/sequential-workflow.yml

      - uses: orchstep/setup-orchstep@v1
        with:
          version: latest

      - uses: orchstep/run-orchstep@v1
        with:
          workflow: demos/11-orchestrated-validation/sequential-workflow.yml