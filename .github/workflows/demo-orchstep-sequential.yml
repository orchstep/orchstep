# Demo 1 — Sequential Validation (no actions/checkout@v4, no curl)
# Uses orchstep run --module to clone the repo via @orchstep/github_action_git-checkout,
# then runs the validation workflow from the cloned repo.
# The --module flag resolves, fetches, and executes a module task in one CLI command.

name: demo-orchstep-sequential
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  orchstep-validate:
    name: orchstep validate (sequential)
    runs-on: ubuntu-latest
    steps:
      - uses: orchstep/setup-orchstep@v1
        with:
          version: latest

      # Clone the repo into a subdirectory using the git-checkout module.
      # The module is resolved via @orchstep/ scope, fetched from github.com/orchstep/orchstep.
      - name: Clone repo via module
        run: |
          orchstep run --module @orchstep/github_action_git-checkout checkout \
            --var repository="https://github.com/orchstep/orchstep.git" \
            --var path=repo --var ref=main --var depth=1

      # Run the validation workflow from the cloned subdirectory
      - uses: orchstep/run-orchstep@v1
        with:
          workflow: demos/11-orchestrated-validation/sequential-workflow.yml
          working-directory: repo