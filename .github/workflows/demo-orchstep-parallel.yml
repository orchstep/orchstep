# Demo 2 — Parallel Validation (no actions/checkout@v4, no curl)
# Uses orchstep run --module to clone the repo, then runs validations in parallel.

name: demo-orchstep-parallel
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  orchstep-validate:
    name: orchstep validate (parallel)
    runs-on: ubuntu-latest
    steps:
      - uses: orchstep/setup-orchstep@v1
        with:
          version: latest

      - name: Clone repo via module
        run: |
          orchstep run --module @orchstep/github_action_git-checkout checkout \
            --var repository="https://github.com/orchstep/orchstep.git" \
            --var path=repo --var ref=main --var depth=1

      - uses: orchstep/run-orchstep@v1
        with:
          workflow: demos/11-orchestrated-validation/parallel-workflow.yml
          working-directory: repo