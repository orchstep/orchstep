# Demo 2 — Parallel Validation (no actions/checkout@v4)
# Bootstraps workflow + module via curl, then git-checkout module clones the
# real repo. All 5 validation checks run in parallel via `parallel:`.

name: demo-orchstep-parallel
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  orchstep-validate:
    name: orchstep validate (parallel)
    runs-on: ubuntu-latest
    steps:
      - name: Bootstrap workflow file
        run: |
          mkdir -p demos/11-orchestrated-validation
          curl -fsSL https://raw.githubusercontent.com/orchstep/orchstep/main/demos/11-orchestrated-validation/parallel-workflow.yml \
            -o demos/11-orchestrated-validation/parallel-workflow.yml

      - uses: orchstep/setup-orchstep@v1
        with:
          version: latest

      - uses: orchstep/run-orchstep@v1
        with:
          workflow: demos/11-orchestrated-validation/parallel-workflow.yml