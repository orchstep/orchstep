# Demo 3 — 5 Validations Orchestrated (no actions/checkout@v4, no curl)
# A tiny inline bootstrap workflow clones the repo via the git-checkout
# module, then run-orchstep runs the module-based orchestrator, which pulls
# all 5 validation modules from the registry over the network.

name: demo-orchstep-multi
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  orchstep-validate:
    name: orchstep validate (orchestrated)
    runs-on: ubuntu-latest
    steps:
      - uses: orchstep/setup-orchstep@v1
        with:
          version: latest

      # Clone the repo using OrchStep itself (replaces actions/checkout@v4).
      # The bootstrap points the @orchstep scope at the module registry and
      # runs the git-checkout module to clone into ./repo.
      - name: Clone repo via OrchStep module
        run: |
          cat > bootstrap.yml <<'YML'
          name: bootstrap
          registries:
            orchstep:
              url: github.com/orchstep/orchstep
              tag: "{module}/v{version}"
          modules:
            - name: gc
              source: "@orchstep/github_action_git-checkout"
              version: "^1.0.0"
          tasks:
            main:
              steps:
                - name: clone
                  module: gc
                  task: checkout
                  with:
                    repository: "https://github.com/orchstep/orchstep.git"
                    path: repo
                    ref: main
                    depth: "1"
          YML
          orchstep run -f bootstrap.yml main

      - uses: orchstep/run-orchstep@v1
        with:
          workflow: demos/11-orchestrated-validation/main-orchestrator.yml
          working-directory: repo