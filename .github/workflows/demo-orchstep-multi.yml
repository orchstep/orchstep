# Demo 3 — Orchestrated Validation (no actions/checkout@v4)
# Bootstraps workflow + module via curl, then git-checkout module clones the
# real repo. Runs 5 validation tasks via the orchestrator workflow.

name: demo-orchstep-multi
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  orchstep-validate:
    name: orchstep validate (orchestrated)
    runs-on: ubuntu-latest
    steps:
      - name: Bootstrap workflow files
        run: |
          mkdir -p demos/11-orchestrated-validation
          mkdir -p modules/@orchstep/github_action_git-checkout
          curl -fsSL https://raw.githubusercontent.com/orchstep/orchstep/main/demos/11-orchestrated-validation/main-orchestrator.yml \
            -o demos/11-orchestrated-validation/main-orchestrator.yml
          curl -fsSL https://raw.githubusercontent.com/orchstep/orchstep/main/modules/@orchstep/github_action_git-checkout/orchstep-module.yml \
            -o modules/@orchstep/github_action_git-checkout/orchstep-module.yml
          curl -fsSL https://raw.githubusercontent.com/orchstep/orchstep/main/modules/@orchstep/github_action_git-checkout/orchstep.yml \
            -o modules/@orchstep/github_action_git-checkout/orchstep.yml

      - uses: orchstep/setup-orchstep@v1
        with:
          version: latest

      - uses: orchstep/run-orchstep@v1
        with:
          workflow: demos/11-orchestrated-validation/main-orchestrator.yml