# Demo 3 — 5 Validations Orchestrated (no actions/checkout@v4, no curl)
# `orchstep run --module` clones the repo via the git-checkout module, then
# run-orchstep runs the module-based orchestrator, which pulls all 5
# validation modules from the registry over the network.

name: demo-orchstep-multi
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  orchstep-validate:
    name: orchstep validate (orchestrated)
    runs-on: ubuntu-latest
    steps:
      - uses: orchstep/setup-orchstep@v1
        with:
          version: latest

      # Clone the repo with OrchStep, replacing actions/checkout@v4.
      # The config points the @orchstep scope at this repo's module registry;
      # `run --module` then resolves, fetches, and runs the git-checkout
      # module's checkout task in one command.
      - name: Clone repo via OrchStep module
        run: |
          cat > orchstep_config.yml <<'YML'
          registries:
            orchstep:
              url: github.com/orchstep/orchstep
              tag: "{module}/v{version}"
          YML
          orchstep run --module @orchstep/github_action_git-checkout checkout \
            --var repository="https://github.com/orchstep/orchstep.git" \
            --var path=repo --var ref=main --var depth=1

      - uses: orchstep/run-orchstep@v1
        with:
          workflow: demos/11-orchestrated-validation/main-orchestrator.yml
          working-directory: repo